<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>✅Conversor de Moeda</title>
        <script src="script.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="geral">
            <h2>Conversor de Moedas✅</h2>
            <select id="txtopcao">
                <option value="1">1-Real para Dólar</option>
                <option value="2">2-Real para Euro</option>
            </select>  
            <input type="number" placeholder="Digite o valor que deseja converter" id="txtvalor" inputmode="decimal">      
            <button onclick="converter()">Converter</button>
            <div id="resultado"></div>
        </div>
    </body>
</html>
